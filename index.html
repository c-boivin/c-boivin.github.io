<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie des Commits</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
    h1 { color: #333; margin: 30px 0; }
    .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
    .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; max-width: 500px; }
    .card img { max-width: 100%; border-radius: 5px; }
    .card p { color: #555; margin-top: 10px; font-style: italic; }
  </style>
</head>
<body>
  <h1>Galerie - Images generees par les commits</h1>
  <div class="gallery">
      <div class="card"><img src="commit_20260402_082051.png" alt="Une prairie"><p>Une prairie</p></div>
  </div>
</body>
</html>
