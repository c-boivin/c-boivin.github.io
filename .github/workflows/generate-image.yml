name: Generate Image & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  recup-last-commit:
    runs-on: ubuntu-latest
    outputs:
      commit_message: ${{ steps.get_commit.outputs.message }}
    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Récupérer le message du dernier commit
        id: get_commit
        run: |
          MESSAGE=$(git log -1 --pretty=%B | head -1)
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          echo "Message du commit : $MESSAGE"

  send-commit-to-api:
    runs-on: ubuntu-latest
    needs: recup-last-commit
    outputs:
      image_url: ${{ steps.call_api.outputs.image_url }}
    steps:
      - name: Envoyer le message à l'API DynaPictures
        id: call_api
        env:
          COMMIT_MSG: ${{ needs.recup-last-commit.outputs.commit_message }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.dynapictures.com/designs/2559d74afa" \
            -H "Authorization: Bearer ${{ secrets.DYNAPICTURES }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg msg "$COMMIT_MSG" '{params: [{name: "text1", text: $msg}]}')")
          echo "Réponse API : $RESPONSE"
          IMAGE_URL=$(echo "$RESPONSE" | jq -r '.imageUrl')
          echo "URL de l'image : $IMAGE_URL"
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT

  dowload-image-and-register-in-images-folder:
    runs-on: ubuntu-latest
    needs: [recup-last-commit, send-commit-to-api]
    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Télécharger l'image et l'enregistrer dans /images/
        env:
          IMAGE_URL: ${{ needs.send-commit-to-api.outputs.image_url }}
          COMMIT_MSG: ${{ needs.recup-last-commit.outputs.commit_message }}
        run: |
          mkdir -p images
          SANITIZED=$(echo "$COMMIT_MSG" | sed 's/[^a-zA-Z0-9àâäéèêëïîôùûüÿçÀÂÄÉÈÊËÏÎÔÙÛÜŸÇ_ -]//g' | sed 's/  */_/g')
          FILENAME="${SANITIZED}.jpeg"
          curl -s -L -o "images/${FILENAME}" "$IMAGE_URL"
          echo "${FILENAME}|${COMMIT_MSG}" > images/new_entry.txt
          ls -la images/

      - name: Commit et push des images sur main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*.jpeg images/*.jpg images/*.png
          git commit -m "Ajout image générée [skip ci]"
          git push

      - name: Sauvegarder l'image en artefact
        uses: actions/upload-artifact@v4
        with:
          name: new-image
          path: images/

  generate-gallery-html:
    runs-on: ubuntu-latest
    needs: dowload-image-and-register-in-images-folder
    steps:
      - name: Récupérer les images existantes depuis gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: existing
        continue-on-error: true

      - name: Préparer le dossier du site
        run: |
          mkdir -p site
          if [ -d "existing" ]; then
            cp existing/*.png existing/*.jpg existing/*.jpeg site/ 2>/dev/null || true
            cp existing/images.txt site/ 2>/dev/null || true
          fi

      - name: Télécharger la nouvelle image
        uses: actions/download-artifact@v4
        with:
          name: new-image
          path: site/

      - name: Mettre à jour le registre des images
        run: |
          touch site/images.txt
          if [ -f site/new_entry.txt ]; then
            cat site/new_entry.txt >> site/images.txt
            rm site/new_entry.txt
          fi

      - name: Générer le fichier index.html
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Galerie des Commits</title>
            <style>
              body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
              h1 { color: #333; margin: 30px 0; }
              .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
              .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; max-width: 500px; }
              .card img { max-width: 100%; border-radius: 5px; }
              .card p { color: #555; margin-top: 10px; font-style: italic; }
            </style>
          </head>
          <body>
            <h1>Galerie d'images</h1>
            <div class="gallery">
          EOF

          while IFS='|' read -r filename message; do
            [ -z "$filename" ] && continue
            if [ -f "site/$filename" ]; then
              echo "      <div class=\"card\"><img src=\"$filename\" alt=\"$message\"><p>$message</p></div>" >> site/index.html
            fi
          done < site/images.txt

          cat >> site/index.html << 'EOF'
            </div>
          </body>
          </html>
          EOF

      - name: Sauvegarder le site en artefact
        uses: actions/upload-artifact@v4
        with:
          name: site-content
          path: site/

  deploy-auto-github-pages-gallery:
    runs-on: ubuntu-latest
    needs: generate-gallery-html
    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Télécharger le contenu du site
        uses: actions/download-artifact@v4
        with:
          name: site-content
          path: site/

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
